services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-b2b_radar}
      POSTGRES_USER: ${POSTGRES_USER:-b2b_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-b2b_radar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    container_name: b2b-radar
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
volumes:
  postgres_data: